name: Build

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build & Analyze
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: app_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:password@localhost:5432/app_test_db
      DATABASE_TEST_URL: postgres://postgres:password@localhost:5432/app_test_db
      JWT_SECRET: ci_secret_not_used_in_prod
      JWT_EXPIRATION: 86400
      JWT_REFRESH_SECRET: ci_refresh_secret_not_used_in_prod
      JWT_REFRESH_EXPIRATION: 604800
      FRONTEND_URL: http://localhost:3000
      SERVER_HOST: 127.0.0.1
      SERVER_PORT: 8080
      ENVIRONMENT: development
      RUST_LOG: info

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Obligatoire pour SonarCloud (analyse de l'historique)

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install diesel CLI
        run: cargo install diesel_cli --no-default-features --features postgres

      - name: Run migrations
        run: diesel migration run

      - name: Run tests with coverage
        run: | 
            cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[0].targets[] | select(.kind[] == "test") | select(.name != "cucumber") | .name' \
            | xargs -I{} cargo llvm-cov --no-report --test {} -- --test-threads=1    
            cargo llvm-cov --no-report --lib -- --test-threads=1
            cargo llvm-cov --no-report --test cucumber
            cargo llvm-cov report --lcov --output-path lcov.info
    
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: >
            -Dsonar.rust.lcov.reportPaths=/home/runner/work/rust-api-template/rust-api-template/lcov.info
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
      - name: Security audit
        run: |
          cargo install cargo-audit
          cargo audit
        continue-on-error: true
