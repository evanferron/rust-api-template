services:
  # ---------------------------------------------------------------------------
  # API — Web Service
  # ---------------------------------------------------------------------------
  - type: web
    name: rust-api-template
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: frankfurt

    plan: free

    healthCheckPath: /api/health

    envVars:
      - key: SERVER_HOST
        value: 0.0.0.0
      - key: SERVER_PORT
        value: 8080
      - key: RUST_LOG
        value: info
      - key: DATABASE_URL
        fromDatabase:
          name: rust-api-db
          property: connectionString
      - key: JWT_SECRET
        sync: false # Valeur à saisir manuellement dans le dashboard Render
      - key: FRONTEND_URL
        sync: false # Valeur à saisir manuellement dans le dashboard Render

  # ---------------------------------------------------------------------------
  # Base de données PostgreSQL
  # ---------------------------------------------------------------------------
databases:
  - name: rust-api-db
    plan: free
    region: frankfurt
    databaseName: app_db
